server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_static on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    location = /index.html {
        add_header Cache-Control "no-store";
        try_files /index.html =404;
    }

    location = /runtime-config.js {
        add_header Cache-Control "no-store";
        try_files /runtime-config.js =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpe?g|webp|gif|ico|svg|woff2?|docx)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
